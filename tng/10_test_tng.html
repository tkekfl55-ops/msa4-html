<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<caption><h1>회원가입을 환영합니다</h1></caption>
<form action="" method="get">
<fieldset>
     <legend>사용자 정보</legend>
     <ul>
       <li>
        아이디 <input type="id" id="id" required minlength="4" maxlength="10" placeholder="4자 ~ 10자 사이, 공백없이">
       </li>
       <li>
        이메일 <input type="email" id="email">
       </li>
       <li>
        비밀번호 <input type="password" id="password" placeholder="문자와 숫자, 특수 기호 포함">
       </li>
       <li>
        비밀번호 확인 <input type="password valid" id="password valid">
       </li>
       <li>
        가입 경로
        <select name="select" id="select">         
        <option value="option" selected>기타</option>  
        <option value="homepage">홈페이지 </option>  
      </select>
       </li>
       <li>
       메모 <textarea name="memo" id="memo"cols="30" rows="10" maxlength="10" placeholder="남길 말씀이 있다면 여기에"></textarea>
       </li>
      </ul>
</fieldset>
<fieldset>
  <legend>이벤트와 새로운 소식</legend>
  <input type="radio" name="mail" id="do">
      <label for="mail">메일 수신</label>
      <input type="radio" name="mail_x" id="not do" checked>
      <label for="mail_x">메일 수신 안 함</label>
</fieldset>
<button type="reset">가입하기</button>
<button type="button">취소</button>
</form>
</body>
</html>
