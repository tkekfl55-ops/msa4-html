<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
 <h1>회원가입을 환영합니다</h1>
</head>
<body>
    <!-- form 태크: 유저가 입력한 정보를 제출하기 위하여 범위를 지정하는 태그 -->
    <form action="" method="get">
    <fieldset>
        <legend>사용자 정보</legend>
        <!-- input 태그: 데이터를 입력 받을 수 있는 태그 -->
       <label 아이디 for="account">아이디</label>
        <input type="text" id="account" minlength="4" maxlength="10" placeholder="4자 ~ 10자 사이, 공백없이"> 
         </input>
       <br>
         <label 비밀번호 for="password"를 입력해주세요.>pw: </label>
        <input type="text" 비밀번호 type="password" id="password" placeholder="문자와 숫자, 특수 기호 포함">
         </input>
    
        <!-- select 태그: 드롭다운 목록을 만드는 태그 -->
         <!-- option 태그: 드롭다운의 리스트를 만드는 태그  
               - value속성: 서버로 넘겨줄 값을 지정 
               - selected속성: 초기에 선택되어 보여질 항목을 지정      
         -->
        <select name="rice" id="rice">
            <option value="bab">밥</option>
            <option value="donggas" selected>돈가스</option>
        
        </select>       
        <!-- button 태그: 버튼을 만들어 주는 태그 -->
        <button type="submit">전송</button>
        <button type="reset">초기화</button>     
        <button type="button">버튼</button>      
        <br><br>
        <!-- 기타 input의 타입 -->
        <input type="email" name="email" id="email">
        <br>
        <input type="number" name="number" id="number" min="0" max="5">
        <br>
        <input type="range" min="0" max="10">
        <br>
        <input type="date" name="date" id="date">
        <br>
        <input type="checkbox" name="banana" id="banana" checked>
        <label for="banana">바나나</label>
        <br>
        <input type="checkbox" name="strawberry" id="strawberry" checked>
        <label for="딸기">딸기</label>
        <br>
        <input type="radio" name="foods" id="coke" checked>
        <label for="coke">콜라</label>
        <br>
        <input type="radio" name="foods1" id="cake" checked>
        <label for="cake">케익</label>
        <br>
        <!-- 화면의 폼에는 보이지 않지만 사용자가 입력을 마치면 함께 서버로 전송되는 속성값 -->
        <input type="hidden" name="hinddenTest" value="내가 보내줄 값">
    </fieldset>
    </form>
</body>
</html>
